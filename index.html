<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #131314; /* Matches Gemini Dark Mode */
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }
        
        .titlebar {
            height: 38px;
            /* Subtle gradient background to give a premium feel */
            background: linear-gradient(90deg, #131314 0%, #1a1a24 50%, #131314 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-app-region: drag;
            /* Glowing gradient border on the bottom */
            box-shadow: 0 1px 0 0 rgba(255, 255, 255, 0.05), 0 2px 10px rgba(0,0,0,0.5);
            color: #e3e3e3;
            user-select: none;
            position: relative;
            z-index: 10;
        }

        /* Gradient line effect at the very bottom of the title bar */
        .titlebar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, rgba(66, 133, 244, 0) 0%, rgba(66, 133, 244, 0.4) 50%, rgba(66, 133, 244, 0) 100%);
            opacity: 0.5;
        }

        .titlebar-title {
            padding-left: 16px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.3px;
        }

        .titlebar-icon {
            width: 16px;
            height: 16px;
            /* Add a subtle glow to the icon */
            filter: drop-shadow(0 0 4px rgba(66, 133, 244, 0.6));
        }

        .titlebar-controls {
            display: flex;
            align-items: center;
            -webkit-app-region: no-drag;
            height: 100%;
            padding-right: 6px;
            gap: 4px;
        }

        .control-btn {
            width: 32px;
            height: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
        }

        .control-btn:hover {
            background-color: rgba(255, 255, 255, 0.08);
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn.close:hover {
            background-color: #e81123;
            color: white;
            box-shadow: 0 0 8px rgba(232, 17, 35, 0.5);
        }

        .control-btn svg {
            width: 14px;
            height: 14px;
            fill: #9aa0a6;
            transition: fill 0.2s;
        }

        .control-btn:hover svg {
            fill: #ffffff;
        }

        /* Pinned state glow */
        .control-btn.active {
            background-color: rgba(66, 133, 244, 0.15);
        }
        
        .control-btn.active svg {
            fill: #669df6; 
            filter: drop-shadow(0 0 3px rgba(102, 157, 246, 0.5));
        }

        /* Specifically adjust close button SVG */
        .control-btn.close:hover svg {
            fill: #ffffff;
        }
    </style>
</head>
<body>
    <div class="titlebar">
        <div class="titlebar-title">
            <img src="icon.png" class="titlebar-icon">
            Gemini
        </div>
        <div class="titlebar-controls">
            <!-- Pin Button -->
            <div class="control-btn" id="pinBtn" title="Toggle Always on Top">
                <svg viewBox="0 0 24 24"><path d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2l-2-2z"/></svg>
            </div>
            <!-- Hide Button -->
            <div class="control-btn" id="hideBtn" title="Hide to Tray">
                <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
            </div>
            <!-- Close Button -->
            <div class="control-btn close" id="closeBtn" title="Close App">
                <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </div>
        </div>
    </div>

    <script>
        window.api.onSettingsUpdate((settings) => {
            const pinBtn = document.getElementById('pinBtn');
            if (settings.alwaysOnTop) {
                pinBtn.classList.add('active');
            } else {
                pinBtn.classList.remove('active');
            }
        });

        document.getElementById('pinBtn').addEventListener('click', () => {
            window.api.togglePin();
        });

        document.getElementById('hideBtn').addEventListener('click', () => {
            window.api.hideWindow();
        });

        document.getElementById('closeBtn').addEventListener('click', () => {
            window.api.closeApp();
        });
    </script>
</body>
</html>
