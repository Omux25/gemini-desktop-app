name: Publish Release

on:
  workflow_run:
    workflows: ["Build Cross-Platform Releases"]
    types:
      - completed

jobs:
  publish-release:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - name: Clean and Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          
          gh api repos/${{ github.repository }}/releases > releases.json
          
          RELEASE_ID=$(jq -r ".[] | select(.tag_name==\"$TAG\") | .id" releases.json | head -n 1)
          
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" == "null" ]; then
            echo "Draft release $TAG not found."
            exit 1
          fi
          
          gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets > assets.json
          jq -c '.[]' assets.json | while read asset; do
            ID=$(echo $asset | jq -r '.id')
            NAME=$(echo $asset | jq -r '.name')
            if [[ "$NAME" == *.blockmap ]] || [[ "$NAME" == *.zip ]]; then
              echo "Deleting $NAME ($ID)"
              gh api -X DELETE repos/${{ github.repository }}/releases/assets/$ID || true
            fi
          done
          
          git log -1 --pretty=%B > release_notes.md
          echo "" >> release_notes.md
          echo "### 📥 Which file should I download?" >> release_notes.md
          echo "* **Windows:** Download \`Gemini-Desktop-Setup-$VERSION.exe\` for a standard install, or \`Portable.exe\` if you want to run it without installing." >> release_notes.md
          echo "* **Mac (Apple Silicon):** Download \`Gemini-Desktop-$VERSION-arm64.dmg\`." >> release_notes.md
          echo "* **Ubuntu/Debian:** Download \`gemini-desktop_$VERSION_amd64.deb\` to install via your package manager." >> release_notes.md
          echo "* **Other Linux Distros:** Download the \`.AppImage\` to run it as a portable app." >> release_notes.md
          
          NOTES=$(cat release_notes.md)
          jq -n \
            --arg name "Gemini Desktop v$VERSION" \
            --arg body "$NOTES" \
            --argjson draft false \
            '{name: $name, body: $body, draft: $draft}' > patch.json
            
          gh api -X PATCH repos/${{ github.repository }}/releases/$RELEASE_ID --input patch.json
