name: Cleanup Releases
on:
  push:
    paths:
      - '.github/workflows/cleanup.yml'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Clean up and Format Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Update v3.4.16 to be the consolidated release
          gh api repos/${{ github.repository }}/releases > all_releases.json
          V3_ID=$(jq -r '.[] | select(.tag_name=="v3.4.16" or .name=="Gemini Desktop v3.4.16 (Hotkey Patch)") | .id' all_releases.json | head -n 1)
          
          if [ ! -z "$V3_ID" ] && [ "$V3_ID" != "null" ]; then
            cat << 'EOF' > v3_notes.md
          This final `v3.x.x` release is a massive culmination of dozens of patches. It completely overhauls the app from a simple web wrapper into a highly optimized, native-feeling desktop experience for power users. 

          ### ✨ Major Features Highlight
          * **Deep Native OS Integrations:** Complete parity for macOS (Native Dock hiding, Apple Silicon support) and Linux (Wayland scaling fixes, `.AppImage` and `.deb` distributions).
          * **Smart Global Hotkey:** Pressing the hotkey (`Alt+Space` / `Cmd+Opt+Space`) now smartly surfaces the app if it was buried, and hides it if it was focused. It also perfectly tracks your precise Window Coordinates (X/Y) so the app respawns exactly where you left it.
          * **Aggressive Memory Optimization:** We built a custom Garbage Collection loop and forced background-tab throttling. Whenever the app is hidden via the hotkey, it immediately dumps RAM to stay ultra-lightweight in the background.
          * **Always-on-Top Pinning:** Re-engineered the pinning mechanic to use native OS floating levels, allowing it to seamlessly overlay even Full-Screen Exclusive games.
          * **Custom Native Settings UI:** Built a highly responsive, natively-injected Settings menu to configure hotkeys, sizes, and startup behavior without relying on messy web popups.
          * **Non-Intrusive Auto Updater:** Updates now silently download in the background and present a beautifully styled, non-intrusive popup when ready to install.
          * **Complete Visual Rebranding:** Integrated a brand new, highly polished AI-generated logo across the entire app UI, titlebars, and native OS taskbars.
          EOF
            
            NOTES=$(cat v3_notes.md)
            jq -n --arg name "Gemini Desktop v3.4.16 (Launch Polish Update)" --arg body "$NOTES" --argjson draft false '{name: $name, body: $body, draft: $draft}' > patch.json
            gh api -X PATCH repos/${{ github.repository }}/releases/$V3_ID --input patch.json
            echo "Updated v3.4.16 release."
          fi

          # 2. Delete all other v3.* drafts
          jq -r '.[] | select((.tag_name != "v3.4.16") and (.name != "Gemini Desktop v3.4.16 (Hotkey Patch)") and ((.tag_name != null and (.tag_name | startswith("v3."))) or (.name != null and (.name | contains("v3."))))) | .id' all_releases.json > delete_v3.txt
          
          while read id; do
            if [ ! -z "$id" ] && [ "$id" != "null" ]; then
              echo "Deleting v3 draft release $id"
              gh api -X DELETE repos/${{ github.repository }}/releases/$id || true
            fi
          done < delete_v3.txt
          
          echo "Cleanup complete."
